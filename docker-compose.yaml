services:
  postgres:
    image: postgres:17-alpine
    container_name: evalu8_db
    environment:
      POSTGRES_USER: evalu8_user
      POSTGRES_PASSWORD: evalu8_password
      POSTGRES_DB: evalu8_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    container_name: evalu8_web
    ports:
      - "3000:3000"
    # Required on some hosts to resolve public AWS endpoints
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=postgresql://evalu8_user:evalu8_password@postgres:5432/evalu8_db
      - NEXTAUTH_SECRET=your-super-secret-key-change-this-in-production-min-32-chars
      - NEXTAUTH_URL=http://localhost:3000
      - GOOGLE_CLIENT_ID=example-google-client-id
      - GOOGLE_CLIENT_SECRET=example-google-client-secret
      - GITHUB_CLIENT_ID=example-github-client-id
      - GITHUB_CLIENT_SECRET=example-github-client-secret
      - WEB_LLM_API_KEY=${WEB_LLM_API_KEY}
      - WEB_LLM_MODEL=${WEB_LLM_MODEL}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - NEXT_PUBLIC_WS_SERVER_URL=${NEXT_PUBLIC_WS_SERVER_URL}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
      - /app/packages/db/generated
    command: pnpm dev:web
    depends_on:
      postgres:
        condition: service_healthy

  ws-server:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    container_name: evalu8_ws
    ports:
      - "$WS_PORT:$WS_PORT"
    # Required to resolve external API endpoints (Deepgram, Cartesia, etc.)
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=postgresql://evalu8_user:evalu8_password@postgres:5432/evalu8_db
      - WS_PORT=${WS_PORT:-8080}
      - WS_LLM_API_KEY=${WS_LLM_API_KEY}
      - WS_LLM_BASE_URL=${WS_LLM_BASE_URL}
      - WS_LLM_MODEL=${WS_LLM_MODEL}
      - WS_LLM_TEMPERATURE=${WS_LLM_TEMPERATURE}
      - WS_LLM_MAX_TOKENS=${WS_LLM_MAX_TOKENS}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - CARTESIA_VOICE_MODEL=${CARTESIA_VOICE_MODEL}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - DEEPGRAM_STT_MODEL_NAME=${DEEPGRAM_STT_MODEL_NAME}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/ws-server/node_modules
      - /app/apps/ws-server/dist
      - /app/packages/db/generated
    command: pnpm dev:ws
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
